# 小说项目配置（novel.yaml）
#
# 说明：
# - 这是“创作约束与目标”的权威入口之一（不会自动写正文）。
# - 修改此文件时，尽量同步更新 state.md 的“关键约束/近期目标”。

title: "《书名待定》"
genre: "玄幻/都市/历史/科幻/悬疑/言情（自填）"
platform: "起点/番茄/晋江/其他（自填）"

# 叙事约束
pov: "第三人称有限 / 第一人称 / 多 POV（自填）"
tense: "过去时 / 现在时（自填）"
tone: "偏爽 / 偏燃 / 偏虐 / 偏日常（自填）"

# 连载目标
target_word_count: 800000
update_schedule: "日更/隔日/周更（自填）"
chapter_length_target: "3000~5000（自填）"

# 结构规划（可粗略）
volumes:
  - name: "第一卷（自填）"
    chapters_target: 80

# 禁忌/红线（自填）
taboos:
  - "未成年人相关敏感内容"
  - "现实涉政敏感"

